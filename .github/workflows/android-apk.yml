name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - mobileApp

jobs:
  preflight:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify project files
        run: |
          pwd
          ls -la
          test -f buildozer.spec
          test -f main.py
          test -f mobile_app.py

      - name: Python syntax check
        run: |
          python -m py_compile main.py mobile_app.py google_drive_helper.py db_helper.py

  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    needs: preflight
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip autoconf automake libtool libtool-bin m4 pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo6 cmake libffi-dev libssl-dev

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Verify project files
        run: |
          pwd
          ls -la
          test -f buildozer.spec

      - name: Inject optional Drive OAuth secret
        env:
          DRIVE_OAUTH_CLIENT_SECRET: ${{ secrets.DRIVE_OAUTH_CLIENT_SECRET }}
        run: |
          if ($env:DRIVE_OAUTH_CLIENT_SECRET) {
            @"
          {
            "client_secret": "$env:DRIVE_OAUTH_CLIENT_SECRET"
          }
          "@ | Set-Content -Path drive_oauth_secret.json
          }
        shell: pwsh

      - name: Build debug APK
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: workout-tracker-apk
          path: bin/*.apk
          if-no-files-found: error
